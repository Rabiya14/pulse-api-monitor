name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt

    - name: Build Docker Image
      run: |
        docker build -t pulse-api-monitor .

    - name: Run Docker Container
      run: |
        docker run -d -p 5000:5000 pulse-api-monitor